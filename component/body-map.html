<div class="body-map-container" style="display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; background:var(--surface2); border:1px solid var(--border); border-radius:12px; min-height:380px;">
    <div style="font-weight:700; font-size:12px; color:var(--text-secondary); text-align:center; width:100%; display:flex; justify-content:center; align-items:center;">👤 Anatomy Map</div>
    
    <svg viewBox="0 0 200 500" class="human-body-svg" style="max-height:340px; width:100%;">
        <!-- Head -->
        <circle cx="100" cy="40" r="30" class="body-part" data-label="Headache/Migraine" />
        
        <!-- Neck -->
        <rect x="85" y="70" width="30" height="20" class="body-part" data-label="Neck Pain" />
        
        <!-- Torso -->
        <path d="M60,95 L140,95 L150,220 L50,220 Z" class="body-part" data-label="Chest/Abdominal Pain" />
        
        <!-- Shoulders -->
        <circle cx="55" cy="110" r="15" class="body-part" data-label="Left Shoulder Pain" />
        <circle cx="145" cy="110" r="15" class="body-part" data-label="Right Shoulder Pain" />
        
        <!-- Arms -->
        <path d="M40,110 L25,250 L45,250 L55,130 Z" class="body-part" data-label="Left Arm Pain" />
        <path d="M160,110 L175,250 L155,250 L145,130 Z" class="body-part" data-label="Right Arm Pain" />
        
        <!-- Hands -->
        <circle cx="20" cy="270" r="10" class="body-part" data-label="Left Hand/Wrist Pain" />
        <circle cx="180" cy="270" r="10" class="body-part" data-label="Right Hand/Wrist Pain" />
        
        <!-- Hips/Pelvis -->
        <path d="M50,220 L150,220 L140,280 L60,280 Z" class="body-part" data-label="Hip/Pelvic Pain" />
        
        <!-- Legs -->
        <path d="M65,280 L55,450 L90,450 L95,280 Z" class="body-part" data-label="Left Leg Pain" />
        <path d="M135,280 L145,450 L110,450 L105,280 Z" class="body-part" data-label="Right Leg Pain" />
        
        <!-- Feet -->
        <path d="M45,455 L40,480 L85,480 L88,455 Z" class="body-part" data-label="Left Foot Pain" />
        <path d="M155,455 L160,480 L115,480 L112,455 Z" class="body-part" data-label="Right Foot Pain" />
    </svg>

    <style>
        .body-map-container {
            user-select: none;
        }
        .body-map-clear-btn {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.2);
            color: #dc2626;
            font-size: 10px;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            margin-left: 8px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .body-map-clear-btn:hover {
            background: #dc2626;
            color: #fff;
            border-color: #dc2626;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.2);
        }
        .body-part {
            fill: #e2e8f0;
            stroke: #94a3b8;
            stroke-width: 1.2;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .body-part:hover {
            fill: #cbd5e1;
            stroke: #10b981;
        }
        .body-part.selected {
            fill: #10b981;
            stroke: #059669;
        }
    </style>
</div>
