<div class="modal" style="max-width:400px">
            <div class="modal-header">
                <div>
                    <div class="modal-title">🔑 Change Password</div>
                    <div class="modal-subtitle" id="changePassSubtitle">Update your account password</div>
                </div>
                <button class="modal-close" onclick="closeModal('changePassModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="field" style="margin-bottom:12px"><label>Current Password</label><input type="password" id="cpOldPass" placeholder="Current password"></div>
                <div class="field" style="margin-bottom:12px"><label>New Password</label><input type="password" id="cpNewPass" placeholder="New password"></div>
                <div class="field" style="margin-bottom:12px"><label>Confirm New Password</label><input type="password" id="cpConfirmPass" placeholder="Confirm new password"></div>
                <div id="changePassError" style="color:var(--red);font-size:12.5px;min-height:18px"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-sm btn-outline-teal" onclick="closeModal('changePassModal')">Cancel</button>
                <button class="btn-sm btn-teal" onclick="submitChangePassword()">🔑 Update Password</button>
            </div>
        </div>
