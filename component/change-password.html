<div class="modal" style="max-width:400px">
            <div class="modal-header">
                <div>
                    <div class="modal-title">🔑 Change Password</div>
                    <div class="modal-subtitle" id="changePassSubtitle">Update your account password</div>
                </div>
                <button class="modal-close" onclick="closeModal('changePassModal')">✕</button>
            </div>
            <div class="modal-body">
                <div class="premium-field">
                    <label>Current Password <span>*</span></label>
                    <div class="premium-input-wrapper">
                        <input type="password" id="cpOldPass" class="premium-input" placeholder="Current password">
                        <button type="button" onclick="togglePasswordVisibilityByID('cpOldPass')" class="premium-pwd-toggle" title="Show/hide">👁</button>
                    </div>
                </div>
                <div class="premium-field">
                    <label>New Password <span>*</span></label>
                    <div class="premium-input-wrapper">
                        <input type="password" id="cpNewPass" class="premium-input" placeholder="New password">
                        <button type="button" onclick="togglePasswordVisibilityByID('cpNewPass')" class="premium-pwd-toggle" title="Show/hide">👁</button>
                    </div>
                </div>
                <div class="premium-field">
                    <label>Confirm New Password <span>*</span></label>
                    <div class="premium-input-wrapper">
                        <input type="password" id="cpConfirmPass" class="premium-input" placeholder="Confirm new password">
                        <button type="button" onclick="togglePasswordVisibilityByID('cpConfirmPass')" class="premium-pwd-toggle" title="Show/hide">👁</button>
                    </div>
                </div>
                <div id="changePassError" style="color:var(--red);font-size:12.5px;min-height:18px"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-sm btn-outline-teal" onclick="closeModal('changePassModal')">Cancel</button>
                <button class="btn-sm btn-teal" onclick="submitChangePassword()">🔑 Update Password</button>
            </div>
        </div>
